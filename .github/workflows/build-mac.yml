name: Build Mac App

on:
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm run dist

      - uses: actions/upload-artifact@v4
        with:
          name: AW-App-Mac
          path: |
            dist/*.dmg
            dist/*.zip
